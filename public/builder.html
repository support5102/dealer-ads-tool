// ── AI HELPERS (identical to React version) ────────────────────────────────────

async function callAI(system, prompt, tokens, tools) {
  var body = { system: system, prompt: prompt, tokens: tokens || 300 };
  if (tools) body.tools = tools;
  var r = await fetch("/api/builder/ai", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  if (!r.ok) { var t = await r.text(); throw new Error("API " + r.status + ": " + t.slice(0,200)); }
  var d = await r.json();
  if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
  return (d.content || []).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
}

function parseJ(txt) {
  var s = txt.indexOf("{"), e = txt.lastIndexOf("}");
  if (s >= 0) try { return JSON.parse(txt.slice(s, e+1)); } catch(ex) {}
  var a = txt.indexOf("["), b = txt.lastIndexOf("]");
  if (a >= 0) try { return JSON.parse(txt.slice(a, b+1)); } catch(ex) {}
  return null;
}

async function geocode(city, st) {
  // Use free Nominatim geocoding API — no API key needed
  var query = encodeURIComponent(city + ", " + st + ", USA");
  var resp = await fetch("https://nominatim.openstreetmap.org/search?q=" + query + "&format=json&limit=1&countrycodes=us", {
    headers: { "User-Agent": "DealerAdsBuilder/1.0" }
  });
  var data = await resp.json();
  if (!data || !data[0]) throw new Error("Could not find coordinates for " + city + ", " + st);
  return [{lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), city: city, state: st, label: city + ", " + st}];
}

async function autofill(url, onStatus) {
  if (!url || url.indexOf("http") !== 0) return null;
  onStatus("Reading dealer website...");
  var system = 'You are extracting info from a car dealership new inventory page. You will use web_search to fetch the actual page and read its content directly.\nDEALER NAME: Use the branded name shown in the site header/logo/title \u2014 e.g. "Thayer Ford" or "Alan Jay Chevrolet". Do NOT use legal entity names, parent company names, or group names like "Thayer Motor Sales" or "AutoNation".\nCITY/STATE: Find the dealership physical street address directly on the page. Check: (1) header \u2014 many dealers show their full address at the top of every page, (2) footer, (3) contact/about page. Use ONLY the city and state from that address. Do NOT guess or use training knowledge \u2014 read the actual page content.\nMAKES: List ONLY the OEM brands this dealer sells as NEW vehicles \u2014 look at the actual nav links and new inventory sections on the page. Do NOT include brands only in used inventory. Do NOT assume or infer makes.\nPLATFORM DETECTION \u2014 read the actual URL structure from inventory links on the page:\n- autofusion: links look like /search/New+Make+Model+tmM\n- teamvelocity: links look like /inventory/new/make/model\n- dealerinspire: links look like /new-vehicles/model/\n- eprocess: links look like /search/new-make-model-city-state/?cy=XXXXX&md=XXXXX&tp=new\n- if none match, all false\nINVENTORY URL: Only needed for teamvelocity sites. Find ONE real new-vehicle page URL from the page. Leave blank for all other types.\nReturn ONLY valid JSON, no other text:\n{"dealerName":"Thayer Chevrolet","city":"Bowling Green","state":"OH","makes":["Chevrolet"],"inventoryUrl":"","inventoryModel":"","autofusion":false,"teamvelocity":false,"dealerinspire":false,"eprocess":false}';
  try {
    var txt = await callAI(system, "Fetch this page and extract the dealer info: " + url, 1000,
      [{"type":"web_search_20250305","name":"web_search"}]);
    var clean = txt.replace(/```[a-z]*/gi,"").replace(/```/g,"").trim();
    var info = parseJ(clean);
    if (!info) { onStatus("Could not read - fill in manually"); return null; }
    onStatus("Found: " + info.dealerName + " | " + (info.makes||[]).join(", ") + " | " + info.city + ", " + info.state);
    return info;
  } catch(ex) { onStatus("Error: " + ex.message); return null; }
}

async function findComps(city, st, makes, dealer, onStatus) {
  try {
    var txt = await callAI(
      'You are a car industry expert with knowledge of dealership locations across the US. Use your training knowledge \u2014 do NOT say you lack real-time data. Return ONLY a raw JSON array of dealer name strings, no markdown, no explanation.',
      "Using your training knowledge, list up to 5 authorized " + makes.join("/") + " franchise dealerships closest to " + city + ", " + st + ". These must be official " + makes.join("/") + " new-car franchises - not independent used car lots. Sort by proximity (closest first). Do NOT include \"" + (dealer||"") + "\". Return only a JSON array like: [\"Dealer A\",\"Dealer B\"]",
      250);
    var clean = txt.replace(/```[a-z]*/gi,"").replace(/```/g,"").trim();
    if(onStatus)onStatus("Raw response: " + clean.slice(0,120));
    var d = parseJ(clean);
    if(!Array.isArray(d)){if(onStatus)onStatus("Competitors parse failed - fill in manually"); return [];}
    if(d.length===0){if(onStatus)onStatus("No competitors found - fill in manually"); return [];}
    if(onStatus)onStatus("Competitors found: " + d.join(", "));
    return d.slice(0,5);
  } catch(ex) {
    if(onStatus)onStatus("Competitors error: " + ex.message);
    return [];
  }
}

// ── URL HELPERS ────────────────────────────────────────────────────────────────

// Common URL abbreviations used by dealer websites
// When swapping model names in URLs, use the alias if one exists
// URL aliases: abbreviations + %20 for spaces on multi-word models
var MODEL_URL_ALIASES = {};
// Auto-generate: any model with a space gets %20 encoding
(function() {
  var allMakes = Object.keys(MM);
  for (var i = 0; i < allMakes.length; i++) {
    var models = MM[allMakes[i]];
    for (var j = 0; j < models.length; j++) {
      var m = models[j];
      if (m.indexOf(" ") >= 0) {
        MODEL_URL_ALIASES[m] = m.replace(/\s+/g, "%20");
      }
    }
  }
  // Override specific abbreviations used by dealer sites
  MODEL_URL_ALIASES["F-250 Super Duty"] = "F-250SD";
  MODEL_URL_ALIASES["F-350 Super Duty"] = "F-350SD";
})();

/**
 * Detects which model name from the MM list appears in a template URL,
 * then replaces it with the target model. Works for ANY site — no need
 * to know the platform type.
 *
 * Example:
 *   tpl = "https://dealer.com/searchnew.aspx?Make=Ford&ModelAndTrim=F-150"
 *   groupMake = "Ford"
 *   mo = "Explorer"
 *   → finds "F-150" in the URL, replaces with "Explorer"
 *   → "https://dealer.com/searchnew.aspx?Make=Ford&ModelAndTrim=Explorer"
 *
 * Handles URL-encoded variants: spaces as +, -, %20, or literal.
 */
function parseTpl(tpl, sm, mo, groupMake) {
  if (!tpl || !mo) return tpl || "";

  // First try known platform patterns (exact match)
  var u = tpl;
  var slug = function(s){return s.toLowerCase().replace(/\s+/g,"-");};
  var mkSlug = groupMake ? slug(groupMake) : "";
  var moSlug = slug(mo);
  var tvMatch = u.match(/\/inventory\/new\/([a-z0-9-]+)\/([a-z0-9-]+)/i);
  if (tvMatch) { return u.replace(/\/inventory\/new\/[a-z0-9-]+\/[a-z0-9-]+/i, "/inventory/new/" + mkSlug + "/" + moSlug); }
  if (/\/search\/New\+[^+]+\+.+?\+tmM/i.test(u)) {
    var enc = function(s){return s.replace(/\s+/g,"+");};
    return u.replace(/\/search\/New\+[^+]+\+.+?\+tmM/i, "/search/New+" + enc(groupMake||"") + "+" + enc(mo) + "+tmM");
  }
  if (/\/new-vehicles\/[a-z0-9-]+\/?/i.test(u)) {
    return u.replace(/\/new-vehicles\/[a-z0-9-]+\/?/i, "/new-vehicles/" + mo.toLowerCase().replace(/\s+/g,"-") + "/");
  }

  // Generic: find any known model name in the URL and swap it
  var models = MM[groupMake] || [];
  // Also check URL aliases as source patterns
  var allAliases = Object.keys(MODEL_URL_ALIASES).map(function(k){ return MODEL_URL_ALIASES[k]; });
  // Sort longest first so "F-250SD" matches before "F-250"
  var sorted = models.slice().sort(function(a,b){ return b.length - a.length; });

  for (var i = 0; i < sorted.length; i++) {
    var m = sorted[i];
    var alias = MODEL_URL_ALIASES[m] || null;
    // Try alias first, then exact, then URL-encoded variants
    var variants = [];
    if (alias) variants.push(alias);
    variants.push(m);
    variants.push(m.replace(/\s+/g, "+"));
    variants.push(m.replace(/\s+/g, "-"));
    variants.push(m.replace(/\s+/g, "%20"));

    for (var v = 0; v < variants.length; v++) {
      var idx = u.toLowerCase().indexOf(variants[v].toLowerCase());
      if (idx >= 0) {
        // Found this model in the URL — replace with target model
        // Use the target model's alias if it has one, otherwise match encoding
        var targetAlias = MODEL_URL_ALIASES[mo];
        var replacement;
        if (targetAlias) {
          replacement = targetAlias;
        } else {
          // Match the encoding style of what we found
          var found = variants[v];
          if (found.indexOf("+") >= 0) replacement = mo.replace(/\s+/g, "+");
          else if (found.indexOf("%20") >= 0) replacement = mo.replace(/\s+/g, "%20");
          else if (found.indexOf("-") >= 0 && mo.indexOf("-") < 0) replacement = mo.replace(/\s+/g, "-");
          else replacement = mo.replace(/\s+/g, "+");
        }
        return u.substring(0, idx) + replacement + u.substring(idx + variants[v].length);
      }
    }
  }

  return null;
}

function buildInventoryUrl(baseUrl, make, model, city, st, siteType) {
  var base = (baseUrl||"").replace(/\/$/,"");
  if (siteType === "autofusion") {
    var enc = function(s){return (s||"").replace(/\s+/g,"+");};
    return base + "/search/New+" + enc(make) + "+" + enc(model) + "+tmM";
  }
  if (siteType === "dealerinspire") {
    return base + "/new-vehicles/" + (model||"").toLowerCase().replace(/\s+/g,"-") + "/";
  }
  if (siteType === "teamvelocity") {
    var sl2 = function(s){return (s||"").toLowerCase().replace(/\s+/g,"-");};
    return base + "/inventory/new/" + sl2(make) + "/" + sl2(model);
  }
  var sl = function(s){return (s||"").toLowerCase().replace(/\s+/g,"-");};
  return base + "/search/new-" + sl(make) + "-" + sl(model) + "-" + sl(city) + "-" + sl(st).slice(0,2) + "/?tp=new";
}

function buildRows(dealer, city, st, groups, startDate, comps, locs, nearbyCities) {
  var rows = [];

  var MK_ALIAS = {"Chevrolet":"Chevy","Volkswagen":"VW","Mercedes-Benz":"Mercedes","Cadillac":"Cadillac","Chrysler":"Chrysler","Genesis":"Genesis"};
  function mka(mk){ return MK_ALIAS[mk] || mk; }

  function bk(){ return blankAdsRow(); }

  // Budget row
  var budgetRow = bk();

    r["Final URL expansion"]="Disabled"; r["Image enhancement"]="Disabled";

  function KR(camp, ag, kw, type){

    r.Keyword=kw; r["Criterion Type"]=type;

    }
    return r;
  }

  function AD(camp, ag, hl, ds, p1, p2, url){
    var r=bk(); r.Campaign=camp; r["Ad Group"]=ag;
    var seenHL={}, dedupedHL=[];
    for(var di=0;di<hl.length;di++){
      var hval=h30(hl[di]);
      if(hval && !seenHL[hval.toLowerCase()]){ seenHL[hval.toLowerCase()]=true; dedupedHL.push(hval); }
    }
    for(var i=0;i<Math.min(dedupedHL.length,15);i++) r["Headline "+(i+1)]=dedupedHL[i];
    for(var j=0;j<Math.min(ds.length,4);j++) r["Description "+(j+1)]=d90(ds[j]);
    var rp1=String(p1||"").slice(0,15); var rp2=String(p2||"").slice(0,15);
    if(!rp1 && rp2){ rp1=rp2; rp2=""; }
    r["Path 1"]=rp1; r["Path 2"]=rp2; r["Final URL"]=url||"";
    r["Ad type"]="Responsive search ad";

    for(var k=1;k<=15;k++) r["Headline "+k+" position"]=" -";

// ── DOM HELPERS ────────────────────────────────────────────────────────────────

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === "className") e.className = attrs[k];
      else if (k === "style" && typeof attrs[k] === "object") Object.assign(e.style, attrs[k]);
      else if (k.slice(0,2) === "on") e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (k === "innerHTML") e.innerHTML = attrs[k];
      else e.setAttribute(k, attrs[k]);
    });
  }
  if (children) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(function(c) {
      if (c == null) return;
      if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    });
  }
  return e;
}

function inp(val, ph, cls, onChange) {
  var i = el("input", {className: "inp " + (cls||""), placeholder: ph || "", value: val || ""});
  if (onChange) i.addEventListener("input", function(){ onChange(i.value); });
  return i;
}

function renderMakeCard(g, gi) {

    className: "border border-white rounded-lg px-3 py-1 text-sm w-28 focus:outline-none text-white font-bold",
    style: {background:"rgba(255,255,255,0.2)"},
    placeholder: "e.g. Jeep", value: g.make
  });
  mkInp.addEventListener("input", function(){ state.groups[gi].make = mkInp.value; });
  hdr.appendChild(mkInp);
  if (MM[g.make]) {
    hdr.appendChild(el("button", {
      className: "bg-white text-green-700 text-xs font-bold px-2 py-1 rounded-lg",
      onClick: function(){ state.groups[gi].models = mkGrp(g.make).models; render(); }

  }
  if (state.groups.length > 1) {
    hdr.appendChild(el("button", {
      className: "ml-auto text-white text-xs", style: {opacity:"0.7"},
      onClick: function(){ state.groups.splice(gi, 1); render(); }
    }, "\u2715 Remove"));
  }
  card.appendChild(hdr);

  // Body
  var body = el("div", {className: "bg-green-50 p-4"});

  // URL + site type row

  var urlDiv = el("div", {className: "flex-1"});
  urlDiv.appendChild(el("p", {className: "text-xs text-gray-500 mb-1"}, "Website URL"));
  urlDiv.appendChild(inp(g.baseUrl, "https://dealersite.com", "", function(v){ state.groups[gi].baseUrl = v; }));
  urlRow.appendChild(urlDiv);

  var stDiv = el("div");
  stDiv.appendChild(el("p", {className: "text-xs text-gray-500 mb-1"}, "Site Type"));
  var stSel = el("select", {className: "inp"});
  [["","Auto-detect"],["autofusion","Autofusion"],["teamvelocity","Team Velocity"],["dealerinspire","Dealer Inspire"],["eprocess","eProcess"]].forEach(function(opt){
    var o = el("option", {value: opt[0]}, opt[1]);
    if (opt[0] === g.siteType) o.selected = true;
    stSel.appendChild(o);
  });
  stSel.addEventListener("change", function(){ state.groups[gi].siteType = stSel.value; render(); });
  stDiv.appendChild(stSel);
  urlRow.appendChild(stDiv);
  body.appendChild(urlRow);

  // Template URL — always shown. Paste ONE model URL and all others auto-generate.
  var tplDiv = el("div", {className: "mb-3"});
  tplDiv.appendChild(el("p", {className: "text-xs font-semibold text-blue-600 mb-1"}, "\u2B50 Paste ONE model inventory URL \u2014 all other models swap automatically"));
  var tplInp = inp(g.templateUrl, "https://dealer.com/searchnew.aspx?Make=Ford&ModelAndTrim=F-150", "font-mono text-xs", function(v) {
    state.groups[gi].templateUrl = v.trim();
    // Try to detect which model this URL is for
    var models = MM[g.make] || [];
    var sorted = models.slice().sort(function(a,b){ return b.length - a.length; });
    var detected = "";
    var lower = v.toLowerCase();
    for (var i = 0; i < sorted.length; i++) {
      var variants = [sorted[i], sorted[i].replace(/\s+/g,"+"), sorted[i].replace(/\s+/g,"-"), sorted[i].replace(/\s+/g,"%20")];
      for (var j = 0; j < variants.length; j++) {
        if (lower.indexOf(variants[j].toLowerCase()) >= 0) { detected = sorted[i]; break; }
      }
      if (detected) break;
    }
    state.groups[gi].templateModel = detected;
    render();
  });
  tplDiv.appendChild(tplInp);
  if (g.templateUrl && g.templateModel) {
    tplDiv.appendChild(el("p", {className: "text-xs text-green-600 mt-1 font-semibold"}, "\u2705 Detected model: " + g.templateModel + " \u2014 swapping for all other models"));
  } else if (g.templateUrl && !g.templateModel) {
    tplDiv.appendChild(el("p", {className: "text-xs text-orange-500 mt-1"}, "\u26A0\uFE0F Could not detect model name in URL \u2014 make sure the URL contains a model name from the list below"));

      if (g.baseUrl && m.name) return buildInventoryUrl(g.baseUrl, g.make, m.name, state.city, state.st, g.siteType);
      if (g.baseUrl) return g.baseUrl.replace(/\/$/, "") + "/";

    };

    var mCard = el("div", {className: "bg-white border border-green-100 rounded-xl p-3"});

    mHdr.appendChild(el("span", {className: "text-xs font-semibold text-green-700"}, "#" + (mi+1)));
    if (g.models.length > 1) {

    mGrid.appendChild(mnDiv);

    // Year 1
    var y1Div = el("div");
    y1Div.appendChild(el("p", {className: "text-xs text-gray-500 mb-1"}, "Year 1"));
    y1Div.appendChild(inp(m.year1, "", "", (function(idx){ return function(v){ state.groups[gi].models[idx].year1 = v; }; })(mi)));
    mGrid.appendChild(y1Div);

    // Year 2
    var y2Div = el("div");
    y2Div.appendChild(el("p", {className: "text-xs text-gray-500 mb-1"}, "Year 2"));
    y2Div.appendChild(inp(m.year2, "", "", (function(idx){ return function(v){ state.groups[gi].models[idx].year2 = v; }; })(mi)));
    mGrid.appendChild(y2Div);

    // Custom URL
    var cuDiv = el("div", {className: "col-span-2"});

    cuDiv.appendChild(inp(m.customUrl, "Leave blank = auto", "", (function(idx){ return function(v){ state.groups[gi].models[idx].customUrl = v; }; })(mi)));
    mGrid.appendChild(cuDiv);

    // Stock
    var skDiv = el("div", {className: "col-span-2"});
    skDiv.appendChild(el("p", {className: "text-xs text-gray-500 mb-1", innerHTML: "In Stock <span class='text-gray-400'>(campaign enables at 4+)</span>"}));
    var skInp = el("input", {className: "inp", type: "number", min: "0", placeholder: "0", value: m.stock});
    skInp.addEventListener("input", (function(idx){ return function(){ state.groups[gi].models[idx].stock = skInp.value; render(); }; })(mi));
    skDiv.appendChild(skInp);
    if (m.stock !== "") {
      var cnt = parseInt(m.stock || 0);
      skDiv.appendChild(el("p", {className: "text-xs mt-1 font-semibold " + (cnt >= 4 ? "text-green-600" : "text-orange-500")},
        cnt >= 4 ? "Campaign will be Enabled" : "Campaign will be Paused (need 4+)"));

    mCard.appendChild(mGrid);

      if (m.urlStatus === "ok") urlStyle += "text-green-700 border-green-300 bg-green-50";
      else if (m.urlStatus === "error" || m.urlStatus === "redirect_home") urlStyle += "text-red-600 border-red-300 bg-red-50";
      else urlStyle += "text-green-700";
      var statusIcon = m.urlStatus === "ok" ? "\u2705 " : m.urlStatus === "error" ? "\u274C " : m.urlStatus === "redirect_home" ? "\u26A0\uFE0F " : "";
      urlWrap.appendChild(el("p", {className: urlStyle}, statusIcon + u));
      mCard.appendChild(urlWrap);
    }

    modelsWrap.appendChild(mCard);
  });
  body.appendChild(modelsWrap);

  // Verify All URLs button
  body.appendChild(el("div", {className: "flex gap-2 mt-3"}, [
    el("button", {
      className: "text-xs text-blue-600 font-semibold px-3 py-1 border border-blue-300 rounded-lg bg-blue-50",
      onClick: (function(groupIdx) { return function() { verifyGroupUrls(groupIdx); }; })(gi)
    }, "\uD83D\uDD0D Verify All URLs"),
    el("button", {
      className: "text-xs text-green-600 font-semibold",

// ── EVENT HANDLERS ─────────────────────────────────────────────────────────────

// ── URL VERIFICATION (no AI needed — pure HTTP checks) ─────────────────────────

async function verifyGroupUrls(gi) {
  var g = state.groups[gi];
  if (!g) return;

  // Collect all URLs for this make group
  var urlMap = {};
  g.models.forEach(function(m, mi) {
    var u = "";
    if (m.customUrl && m.customUrl.trim()) u = m.customUrl.trim();
    else if (g.baseUrl && m.name) u = buildInventoryUrl(g.baseUrl, g.make, m.name, state.city, state.st, g.siteType);
    if (u) urlMap[mi] = u;
  });

  var urls = Object.values(urlMap);
  if (urls.length === 0) { alert("No URLs to verify — add a Website URL first"); return; }

  // Mark all as checking
  g.models.forEach(function(m) { m.urlStatus = "checking"; });
  render();

  try {
    var res = await fetch("/api/builder/verify-urls", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ urls: urls })
    });
    var data = await res.json();
    if (data.results) {
      // Map results back to models
      var resultMap = {};
      data.results.forEach(function(r) { resultMap[r.url] = r.status; });
      Object.keys(urlMap).forEach(function(mi) {
        var url = urlMap[mi];
        state.groups[gi].models[parseInt(mi)].urlStatus = resultMap[url] || "unknown";
      });
    }
  } catch(ex) {
    g.models.forEach(function(m) { m.urlStatus = null; });
  }
  render();
}

function addMsg(m) {
  state.autoMsg = state.autoMsg.slice(-2).concat([m]);
  render();
}

async function runFill() {
  if (!state.autoUrl.trim()) return;
  state.busy = true; state.autoMsg = []; render();

  var url = state.autoUrl.trim();
  var base = url.replace(/\/$/, "").replace(/^(https?:\/\/[^\/]+).*$/, "$1");

  // Detect site type from URL patterns
  var siteType = "";
  if (/\/search\/New\+/i.test(url)) siteType = "autofusion";
  else if (/\/inventory\/new\//i.test(url)) siteType = "teamvelocity";
  else if (/\/new-vehicles\//i.test(url)) siteType = "dealerinspire";
  else if (/\/search\/new-.*\?.*tp=new/i.test(url)) siteType = "eprocess";
  else if (/searchnew\.aspx/i.test(url)) siteType = "eprocess";

  // Try to detect the make from the URL
  var detectedMakes = [];
  var allMakes = SINGLES.concat(Object.keys(COMBOS));
  // Check URL params (e.g. ?Make=Ford)
  try {
    var params = new URL(url).searchParams;
    var mkParam = params.get("Make") || params.get("make") || params.get("mk") || "";
    if (mkParam) {
      var found = SINGLES.find(function(s) { return s.toLowerCase() === mkParam.toLowerCase(); });
      if (found) detectedMakes.push(found);
    }
  } catch(_) {}
  // Check URL path segments (e.g. /new/ford/ or /new-vehicles/ford/)
  if (detectedMakes.length === 0) {
    var lower = url.toLowerCase();
    SINGLES.forEach(function(mk) {
      var slug = mk.toLowerCase().replace(/\s+/g, "-");
      if (lower.indexOf("/" + slug + "/") >= 0 || lower.indexOf("/" + slug + "?") >= 0 ||
          lower.indexOf("+" + slug + "+") >= 0 || lower.indexOf("=" + slug) >= 0) {
        detectedMakes.push(mk);
      }
    });
  }

  // Auto-populate makes and models
  if (detectedMakes.length > 0) {
    state.groups = detectedMakes.map(function(mk) {
      var g = mkGrp(mk);
      g.baseUrl = base;
      g.siteType = siteType;
      if (url !== base) g.templateUrl = url;
      return g;
    });
    addMsg("\u2705 Detected make: " + detectedMakes.join(", "));
    addMsg("\u2705 Loaded " + state.groups.reduce(function(sum, g) { return sum + g.models.length; }, 0) + " models");
  } else {
    // No make detected — just set the base URL, user picks make manually
    state.groups.forEach(function(g) {
      g.baseUrl = base;
      if (siteType) g.siteType = siteType;
      if (url !== base) g.templateUrl = url;
    });
    addMsg("\u2139\uFE0F Could not detect make from URL \u2014 select one below");
  }

  if (siteType) {
    addMsg("\u2705 Site type: " + siteType);
  }
  addMsg("\u2705 Base URL: " + base);
  addMsg("\u2139\uFE0F Click \"\uD83D\uDD0D Verify All URLs\" to check every model inventory link");

  state.busy = false;
  render();
}

async function go() {
  var e = [];
  if (!state.dealer.trim()) e.push("Dealer name required");
  if (!state.city.trim()) e.push("City required");
  if (!state.st.trim()) e.push("State required");
  var hasModel = state.groups.some(function(g){ return g.make.trim() && g.models.some(function(m){ return m.name.trim(); }); });
  if (!hasModel) e.push("At least one make + model required");
  if (e.length) { state.errs = e; render(); return; }
  state.errs = [];

  try {
    var res = await geocode(state.city.trim(), state.st.trim());
    if (res && res[0]) {
      var pin = [{label: res[0].city || state.city.trim(), lat: res[0].lat.toFixed(6), lng: res[0].lng.toFixed(6), radius: "20"}];
      doGenerate(pin);
    } else {
      state.errs = ["Could not find location for " + state.city + ", " + state.st + ". Check city and state spelling."];
      render();
    }
  } catch(ex) {
    state.errs = ["Geocode error: " + ex.message];
    render();
  }
}

function doGenerate(resolvedLocs) {
  try {
    var fg = state.groups.filter(function(g){return g.make.trim();}).map(function(g){
      return Object.assign({}, g, {models: g.models.filter(function(m){return m.name.trim();})});
    });
    var rows = buildRows(state.dealer.trim(), state.city.trim(), state.st.trim(), fg, state.start, state.comps, resolvedLocs, state.nearbyCities);
    if (!rows || rows.length === 0) { state.errs = ["No rows generated \u2014 check makes & models"]; render(); return; }
    var csv = buildAdsCSV(rows);
    var blob = new Blob([csv], {type: "text/csv;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.style.display = "none"; a.href = url;
    a.download = state.dealer.trim().replace(/\s+/g, "_") + "_GoogleAds.csv";
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
    state.cnt = rows.length; state.done = true;
    render();
  } catch(ex) {
    console.error("Generate failed:", ex);
    state.errs = ["Error: " + ex.message];
    render();
  }
}

// ── BOOT ───────────────────────────────────────────────────────────────────────
render();
