<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Auto-Adjuster</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="/pacing-styles.css"/>
  <style>
    .adj-main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .adj-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .adj-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #f1f5f9;
      flex: 1;
    }
    .scan-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .scan-btn:hover { opacity: 0.9; }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading */
    .loading-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result cards */
    .adj-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .adj-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .adj-dealer-name {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      flex: 1;
    }
    .adj-urgency {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
    }
    .adj-urgency.critical { background: #3d0d0d; border: 1px solid #991b1b; color: #f87171; }
    .adj-urgency.high     { background: #2a1f0d; border: 1px solid #92400e; color: #fbbf24; }
    .adj-urgency.medium   { background: #0d1a2a; border: 1px solid #1e40af; color: #60a5fa; }

    .adj-direction {
      font-size: 12px;
      color: var(--text3);
    }
    .adj-reasons {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 12px;
    }

    /* Budget change table within card */
    .adj-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .adj-table th {
      text-align: left;
      padding: 6px 8px;
      color: var(--text3);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .adj-table td {
      padding: 8px 8px;
      border-bottom: 1px solid var(--border2);
      color: var(--text);
    }
    .adj-table .change-pos { color: #4ade80; }
    .adj-table .change-neg { color: #f87171; }

    .shared-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      background: #1e293b;
      color: #94a3b8;
      margin-left: 4px;
    }

    /* Action buttons */
    .adj-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .btn-approve {
      background: #166534;
      color: #4ade80;
      border: 1px solid #166534;
      padding: 6px 16px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-approve:hover { background: #14532d; }
    .btn-reject {
      background: transparent;
      color: var(--text3);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-reject:hover { color: #f87171; border-color: #991b1b; }

    /* Summary bar */
    .scan-summary {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .scan-stat {
      font-size: 12px;
      color: var(--text3);
    }
    .scan-stat strong {
      color: var(--text);
      font-size: 14px;
    }

    .empty-msg { text-align: center; padding: 40px; color: var(--text3); }
    .error-msg { text-align: center; padding: 40px; color: var(--red); }

    /* Executed result */
    .execution-result {
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      font-size: 12px;
    }
    .execution-result.success { background: #071a0e; border: 1px solid #166534; color: #4ade80; }
    .execution-result.partial { background: #2a1f0d; border: 1px solid #92400e; color: #fbbf24; }
    .execution-result.failed  { background: #3d0d0d; border: 1px solid #991b1b; color: #f87171; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">$</div>
    <div>
      <div class="logo-text">Budget Auto-Adjuster</div>
      <div class="logo-sub">Detect &middot; Review &middot; Approve</div>
    </div>
  </div>
  <div class="header-right" id="headerRight">
    <a href="/" class="nav-link">Task Manager</a>
    <a href="/pacing-overview.html" class="nav-link">Pacing</a>
    <a href="/audit.html" class="nav-link">Auditor</a>
    <a href="/builder.html" class="nav-link">Builder</a>
    <a href="/change-history.html" class="nav-link">History</a>
    <span class="connect-btn" id="authStatus" style="pointer-events:none;opacity:0.5">Checking...</span>
  </div>
</div>

<!-- MAIN -->
<div class="adj-main">
  <div class="adj-controls">
    <div class="adj-title">Budget Adjustments</div>
    <button class="scan-btn" id="scanBtn" onclick="runScan()">Scan for Issues</button>
  </div>

  <div id="scanSummary" class="scan-summary" style="display:none"></div>
  <div id="content">
    <div class="empty-msg">Click "Scan for Issues" to detect accounts that need budget adjustments.</div>
  </div>
</div>

<script src="/budget-adjustments-app.js"></script>
</body>
</html>
