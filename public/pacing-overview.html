<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Pacing Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="/pacing-styles.css"/>
  <style>
    .overview-main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }
    .overview-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .overview-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #f1f5f9;
      flex: 1;
    }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Table */
    .overview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .overview-table th {
      text-align: left;
      padding: 10px 12px;
      color: var(--text3);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .overview-table th:hover { color: var(--text2); }
    .overview-table td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--border2);
      color: var(--text);
      white-space: nowrap;
    }
    .overview-table tr {
      cursor: pointer;
      transition: background .1s;
    }
    .overview-table tbody tr:hover {
      background: rgba(59, 130, 246, 0.05);
    }

    /* Status mini badges */
    .status-mini {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
    }
    .status-mini.green  { background: #071a0e; border: 1px solid #166534; color: #4ade80; }
    .status-mini.yellow { background: #2a1f0d; border: 1px solid #92400e; color: #fbbf24; }
    .status-mini.red    { background: #3d0d0d; border: 1px solid #991b1b; color: #f87171; }

    .pace-green  { color: #4ade80; }
    .pace-yellow { color: #fbbf24; }
    .pace-red    { color: #f87171; }

    .trend-up   { color: #4ade80; }
    .trend-down { color: #f87171; }
    .trend-flat { color: var(--text3); }

    .adj-positive { color: #4ade80; }
    .adj-negative { color: #f87171; }

    /* Error / empty states */
    .error-msg {
      text-align: center;
      padding: 40px;
      color: var(--red);
    }
    .empty-msg {
      text-align: center;
      padding: 40px;
      color: var(--text3);
    }

    /* Failed section */
    .failed-section {
      margin-top: 24px;
      padding: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .failed-section summary {
      cursor: pointer;
      color: var(--text3);
      font-size: 12px;
    }
    .failed-section ul {
      margin-top: 8px;
      padding-left: 20px;
      color: var(--text3);
      font-size: 12px;
    }

    /* Summary bar */
    .summary-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-stat {
      font-size: 12px;
      color: var(--text3);
    }
    .summary-stat strong {
      color: var(--text);
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">$</div>
    <div>
      <div class="logo-text">Budget Pacing Overview</div>
      <div class="logo-sub">All Accounts &middot; Month-to-Date</div>
    </div>
  </div>
  <div class="header-right" id="headerRight">
    <a href="/" class="nav-link">Task Manager</a>
    <a href="/pacing-overview.html" class="nav-link">Pacing</a>
    <a href="/audit.html" class="nav-link">Auditor</a>
    <a href="/builder.html" class="nav-link">Builder</a>
    <a href="/change-history.html" class="nav-link">History</a>
    <span class="connect-btn" id="authStatus" style="pointer-events:none;opacity:0.5">Checking...</span>
  </div>
</div>

<!-- MAIN -->
<div class="overview-main">

  <div class="overview-controls">
    <div class="overview-title">All Dealer Accounts</div>
    <button class="btn-primary" id="refreshBtn" onclick="loadOverview()">Refresh</button>
  </div>

  <div id="summaryBar" class="summary-bar" style="display:none"></div>
  <div class="loading-state" id="loadingState" style="display:none">
    <div class="spinner"></div>
    <p>Loading all accounts...</p>
  </div>
  <div id="content"></div>
  <div id="failedSection"></div>
</div>

<script src="/pacing-overview-app.js"></script>
</body>
</html>
